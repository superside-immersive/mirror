<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <base href="/receipt/">
  <title>Everything Adds Up With AMC</title>

  <meta name="description" content="AMC AR Couch Hunt — Spot the Couch, Snap It, Show It, Get Swag">
  <meta property="og:title" content="Everything Adds Up With AMC">
  <meta property="og:description" content="Find the hidden couch in AR and claim your swag!">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/brand-tokens.css">
  <link rel="stylesheet" href="css/styles.css">

  <!-- ─── 8th Wall Engine (open-source SLAM) ─── -->
  <!--
    These scripts come from the 8th Wall open-source packages.
    Setup:
      1. Clone https://github.com/8thwall/aframe-world-effects-example
      2. Copy its external/ folder into this project root
      OR
      3. Build from source: https://github.com/8thwall/8thwall
    SLAM binary: https://8th.io/xrjs
  -->
  <script src="external/scripts/8frame-1.5.0.min.js"></script>
  <script src="external/xrextras/xrextras.js"></script>
  <script src="external/landing-page/landing-page.js"></script>
  <script src="external/xr/xr.js" async data-preload-chunks="slam"></script>

  <meta name="8thwall:renderer" content="aframe:1.5.0">
  <meta name="8thwall:package" content="@8thwall.xrextras">
  <meta name="8thwall:package" content="@8thwall.landing-page">
</head>

<body>

  <!-- ─── App Scripts (register components before <a-scene>) ─── -->
  <script src="js/components/couch-placer.js"></script>
  <script src="js/components/couch-detector.js"></script>
  <script src="js/ui/state-manager.js"></script>
  <script src="js/ui/screen-capture.js"></script>
  <script src="js/app.js"></script>

  <!-- ─── UI Overlay ─── -->
  <div id="app-overlay">

    <!-- Header -->
    <header id="header">
      <img src="assets/amc-logo.svg" alt="Albertsons Media Collective" id="logo">
    </header>

    <!-- Title -->
    <div id="title-block">
      <p class="eyebrow">AMC COUCH HUNT</p>
      <h1>Find the <span>couch</span></h1>
      <p class="subtitle">Scan it. Snap it. Show it. Claim it.</p>
    </div>

    <!-- CTA: Searching -->
    <div id="cta-search" class="cta active">
      <div class="instruction-card">
        <div class="instruction-step">
          <span class="step-badge">1</span>
          <p>Look up and scan the space</p>
        </div>
        <div class="instruction-step">
          <span class="step-badge">2</span>
          <p>Find the floating couch</p>
        </div>
      </div>
    </div>

    <!-- CTA: Found → Snap -->
    <div id="cta-found" class="cta">
      <button id="btn-snap">TAKE PHOTO</button>
    </div>

    <!-- Found target indicator -->
    <div id="found-indicator"></div>

    <!-- Flash effect -->
    <div id="flash"></div>

    <!-- Capture Card -->
    <div id="capture-card">
      <img src="assets/amc-logo.svg" alt="AMC" class="card-logo">
      <img id="captured-photo" alt="Your AR capture">
      <h2>You won!</h2>
      <p class="card-subtitle">Show this photo at the AMC booth to claim your swag.</p>
      <button id="btn-claim">CLAIM YOUR SWAG</button>
    </div>

    <!-- Progress Steps -->
    <nav id="progress">
      <div class="step active" data-step="spot">
        <div class="dot"></div>
        <label>Spot</label>
      </div>
      <div class="line"></div>
      <div class="step" data-step="snap">
        <div class="dot"></div>
        <label>Snap</label>
      </div>
      <div class="line"></div>
      <div class="step" data-step="show">
        <div class="dot"></div>
        <label>Show</label>
      </div>
      <div class="line"></div>
      <div class="step" data-step="swag">
        <div class="dot"></div>
        <label>Swag</label>
      </div>
    </nav>
  </div>

  <!-- ─── A-Frame AR Scene ─── -->
  <a-scene
    couch-detector
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true; preserveDrawingBuffer: true; physicallyCorrectLights: true; shadowMapEnabled: true; shadowMapType: pcfsoft"
    xrweb="allowedDevices: any;">

    <!-- Assets -->
    <a-assets>
      <!--
        Place your couch.glb model in the assets/ folder.
        Recommended: optimised GLB, < 2 MB, centered origin.
      -->
      <a-asset-item id="couchModel" src="assets/couch2.glb"></a-asset-item>
    </a-assets>

    <!-- Camera -->
    <a-camera
      id="camera"
      position="0 1.6 0">
    </a-camera>

    <!-- Shadow-only floor plane (AR passthrough — only shadow is visible) -->
    <a-plane
      shadow-floor
      rotation="-90 0 0"
      width="30"
      height="30"
      position="0 0 0">
    </a-plane>

    <!-- Couch (placed dynamically by couch-placer) -->
    <a-entity
      id="couch"
      couch-placer
      gltf-model="#couchModel"
      shadow="cast: true; receive: true"
      visible="false">
    </a-entity>

    <!-- Lighting -->
    <a-entity
      light="type: directional; intensity: 1.1; castShadow: true; shadowCameraLeft: -12; shadowCameraRight: 12; shadowCameraTop: 12; shadowCameraBottom: -12; shadowCameraFar: 30; shadowMapWidth: 2048; shadowMapHeight: 2048; shadowBias: -0.001"
      xrextras-attach="target: camera; offset: 5 12 3"
      position="1 4.3 2.5">
    </a-entity>

    <a-light type="ambient" intensity="0.45"></a-light>

  </a-scene>

  <!-- ─── Dev: Rotation offset panel ─── -->
  <div id="dev-rot-panel" style="
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      z-index: 9999; background: rgba(0,0,0,0.72); color: #fff;
      padding: 12px 16px; border-radius: 14px; min-width: 270px;
      font-family: monospace; font-size: 12px; pointer-events: auto;
      backdrop-filter: blur(6px); box-shadow: 0 4px 20px rgba(0,0,0,0.4);">
    <div style="text-align:center; letter-spacing:2px; margin-bottom:10px; font-size:11px; opacity:.7;">ROTATION OFFSET</div>
    <label style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
      <span style="width:10px">X</span>
      <input type="range" id="rot-x" min="-180" max="180" value="0" style="flex:1; accent-color:#028FFF;">
      <span id="rot-x-val" style="width:36px; text-align:right;">0°</span>
    </label>
    <label style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
      <span style="width:10px">Y</span>
      <input type="range" id="rot-y" min="-180" max="180" value="0" style="flex:1; accent-color:#028FFF;">
      <span id="rot-y-val" style="width:36px; text-align:right;">0°</span>
    </label>
    <label style="display:flex; align-items:center; gap:8px;">
      <span style="width:10px">Z</span>
      <input type="range" id="rot-z" min="-180" max="180" value="0" style="flex:1; accent-color:#028FFF;">
      <span id="rot-z-val" style="width:36px; text-align:right;">0°</span>
    </label>
  </div>
  <script>
    window.AMC = window.AMC || {};
    window.AMC.couchRotOffset = { x: 0, y: 0, z: 0 };
    ['x', 'y', 'z'].forEach(function (axis) {
      var slider = document.getElementById('rot-' + axis);
      var label  = document.getElementById('rot-' + axis + '-val');
      slider.addEventListener('input', function () {
        window.AMC.couchRotOffset[axis] = parseFloat(this.value);
        label.textContent = this.value + '\u00b0';
      });
    });
  </script>

</body>
</html>
