<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sky Debug</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #111; }
  </style>
</head>
<body>
  <a-scene renderer="colorManagement: true; physicallyCorrectLights: false" background="color: #101420">
    <a-assets timeout="20000">
      <img id="skyTex" src="./assets/common/clear_sky.jpg">
    </a-assets>

    <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>

    <a-sphere
      id="debug-sky"
      radius="12"
      segments-width="64"
      segments-height="32"
      position="0 1.6 0"
      material="shader: flat; side: back; src: #skyTex; color: #ffffff">
    </a-sphere>

    <a-box position="0 0.5 -3" depth="1" height="1" width="1" color="#4CC3D9"></a-box>
  </a-scene>
  <script src="./sky-debug.js"></script>
</body>
</html>
