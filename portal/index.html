<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <base href="/portal/">
  <title>Portal Tracker · A-Frame + 8th Wall</title>
  <meta itemprop="name" content="Portal Tracker">
  <meta name="twitter:title" content="Portal Tracker · A-Frame + 8th Wall">
  <meta property="og:title" content="Portal Tracker · A-Frame + 8th Wall">
  <meta property="og:site_name" content="Portal Tracker">
  <meta name="description" content="Image-tracked portal experience with A-Frame and a desktop preview fallback.">
  <meta itemprop="description" content="Image-tracked portal experience with A-Frame and a desktop preview fallback.">
  <meta property="og:description" content="Image-tracked portal experience with A-Frame and a desktop preview fallback.">
  <meta name="twitter:description" content="Image-tracked portal experience with A-Frame and a desktop preview fallback.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./ui-shell.css">
  <style>
    /* AMC Scan-CTA postcard — Albertsons blue + white only */
    .amc-cta {
      --amc-blue:  #003E7E;
      --amc-white: #FFFFFF;
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      pointer-events: none;
      background: rgba(0, 13, 26, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: opacity 400ms ease, visibility 400ms ease;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .amc-cta[hidden-state] { opacity: 0; visibility: hidden; }
    .amc-cta__card {
      pointer-events: auto;
      width: min(340px, 100%);
      background: var(--amc-blue);
      color: var(--amc-white);
      border-radius: 20px;
      padding: 32px 28px 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      text-align: center;
      animation: amcCtaIn 500ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .amc-cta__logo {
      display: block;
      width: 160px;
      height: auto;
      margin: 0 auto 24px;
      filter: brightness(0) invert(1);
    }
    .amc-cta__title {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--amc-white);
    }
    @keyframes amcCtaIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
  </style>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script>
</head>
<body class="portal-shell">
  <!-- ═══════════════════════════════════════════════════════
       AMC Scan CTA — shown until the image target is detected.
       ═══════════════════════════════════════════════════════ -->
  <div id="amc-cta" class="amc-cta" role="dialog" aria-labelledby="amc-cta-title">
    <div class="amc-cta__card" id="amc-cta-dismiss">
      <img class="amc-cta__logo" src="./assets/common/amc-logo.svg" alt="Albertsons Media Collective" />
      <h2 id="amc-cta-title" class="amc-cta__title">Scan the city to enter the portal</h2>
    </div>
  </div>

  <div class="hud">
    <div class="status-chip">
      <span class="status-label">Image-tracked portal</span>
      <p id="status" class="status">Initializing XR runtime...</p>
      <p id="compatibility" class="compatibility"></p>
    </div>
  </div>
    </div>
  </div>

  <a-scene renderer="antialias: false; colorManagement: true; physicallyCorrectLights: false; precision: mediump" xrweb="allowedDevices: any; disableWorldTracking: true; disableDefaultEnvironment: true; delayRun: true" gltf-model="dracoDecoderPath: ./external/runtime/resources/draco/; basisTranscoderPath: ./external/runtime/resources/basis/" loading-screen="enabled: false" background="color: #05070f">
    <a-assets timeout="20000">
      <a-asset-item id="cityModel" src="./assets/city-light-blend.glb"></a-asset-item>
      <img id="imageTargetReference" data-src="./image-targets/download-1773332030950-2-2_original.png" alt="Image target reference">
      <img id="skyTexture" src="./assets/common/clear_sky.jpg">
    </a-assets>

    <a-camera id="camera" position="0 0.3 1.5" rotation="0 0 0"></a-camera>

    <a-entity id="target-anchor" image-target-anchor="name: download-1773332030950-2-2" position="0 0 0" rotation="0 0 0" scale="1 1 1">
      <a-entity id="target-reference" visible="false">
        <a-plane id="target-reference-image" width="1" height="1.3325991189" position="0 0 -0.025" material="src: #imageTargetReference; transparent: true; opacity: 0.58; side: double; shader: flat"></a-plane>
        <a-box id="target-reference-top" width="1.06" height="0.025" depth="0.012" position="0 0.6787995595 -0.02" color="#8ab4ff"></a-box>
        <a-box id="target-reference-bottom" width="1.06" height="0.025" depth="0.012" position="0 -0.6787995595 -0.02" color="#8ab4ff"></a-box>
        <a-box id="target-reference-left" width="0.025" height="1.3825991189" depth="0.012" position="-0.5175 0 -0.02" color="#8ab4ff"></a-box>
        <a-box id="target-reference-right" width="0.025" height="1.3825991189" depth="0.012" position="0.5175 0 -0.02" color="#8ab4ff"></a-box>
      </a-entity>

      <a-entity id="portal-root" position="0 0 0" rotation="0 0 0" scale="0.76 0.76 0.76" portal="width: 1; height: 1.3325991189">
        <a-entity id="portal-frame">
          <a-box id="portal-frame-left" depth="0.04" height="1.3541666667" width="0.01" position="-0.505 0 0.01" color="#6c7fb0"></a-box>
          <a-box id="portal-frame-right" depth="0.04" height="1.3541666667" width="0.01" position="0.505 0 0.01" color="#6c7fb0"></a-box>
          <a-box id="portal-frame-top" depth="0.04" height="0.01" width="1.02" position="0 0.6713 0.01" color="#6c7fb0"></a-box>
          <a-box id="portal-frame-bottom" depth="0.04" height="0.01" width="1.02" position="0 -0.6713 0.01" color="#44506c"></a-box>
        </a-entity>

        <a-entity id="hider-walls" data-hider-walls>
          <a-plane width="28" height="13.33292" position="0 7.33354 0.005" depth-mask></a-plane>
          <a-plane width="28" height="13.33292" position="0 -7.33354 0.005" depth-mask></a-plane>
          <a-plane width="13.5" height="1.3325991189" position="-7.25 0 0.005" depth-mask></a-plane>
          <a-plane width="13.5" height="1.3325991189" position="7.25 0 0.005" depth-mask></a-plane>
          <a-plane width="28" height="28" position="0 0 -26" depth-mask></a-plane>
          <a-plane width="26" height="28" position="-14 0 -13" rotation="0 90 0" depth-mask></a-plane>
          <a-plane width="26" height="28" position="14 0 -13" rotation="0 -90 0" depth-mask></a-plane>
          <a-plane width="28" height="26" position="0 14 -13" rotation="90 0 0" depth-mask></a-plane>
          <a-plane width="28" height="26" position="0 -14 -13" rotation="-90 0 0" depth-mask></a-plane>
        </a-entity>

        <a-entity id="portal-contents" data-portal-contents>
          <a-sphere id="portal-sky" radius="12" segments-width="32" segments-height="16" position="0 0 -13" material="shader: flat; side: back; src: #skyTexture; color: #fff"></a-sphere>
          <a-circle id="portal-floor" radius="4" rotation="-90 0 0" position="0 -1.08 -5" material="color: #223150; opacity: 0.92"></a-circle>
          <a-entity id="portal-city" gltf-model="#cityModel" gltf-loop-animation unlit-model position="0 -0.93 0" rotation="0 270 0" scale="0.12 0.12 0.12"></a-entity>
          <a-sphere id="portal-orb" radius="0.12" position="0 0.6135 -1.2" material="shader: flat; color: #8ab4ff; emissive: #8ab4ff; emissiveIntensity: 1.2" bob="distance: 0.08; duration: 1200"></a-sphere>
        </a-entity>
      </a-entity>

      <a-entity id="narrative-layer" narrative-sequence></a-entity>
    </a-entity>
  </a-scene>

  <script src="bundle.js"></script>
  <script>
    // AMC Scan-CTA controller: auto-hide once the image target is tracked.
    (function () {
      var cta = document.getElementById('amc-cta');
      var dismissBtn = document.getElementById('amc-cta-dismiss');
      if (!cta) return;
      var hide = function () {
        if (cta.hasAttribute('hidden-state')) return;
        cta.setAttribute('hidden-state', '');
        setTimeout(function () { cta.style.display = 'none'; }, 500);
      };
      if (dismissBtn) dismissBtn.addEventListener('click', hide);
      var scene = document.querySelector('a-scene');
      if (scene) {
        scene.addEventListener('xrimagefound', hide, { once: true });
        scene.addEventListener('realityready', function () {
          if (window.XR8 && window.XR8.XrDevice) {
            var compatible = window.XR8.XrDevice.isDeviceBrowserCompatible({ allowedDevices: 'any' });
            if (!compatible) setTimeout(hide, 2500);
          }
        });
      }
    })();
  </script>
  <script>
    (function () {
      var statusEl = document.getElementById('status')
      var compatibilityEl = document.getElementById('compatibility')

      var translations = {
        'Inicializando runtime XR…': 'Initializing XR runtime...',
        'Solicitando acceso a cámara o sesión desktop…': 'Requesting camera access or a desktop session...',
        'Cámara lista. Buscando el image target configurado…': 'Camera ready. Looking for the configured image target...',
        'Video activo. Escaneá el image target para fijar el portal.': 'Camera is live. Scan the image target to anchor the portal.',
        'Desktop preview activo. Podés navegar la escena e inspeccionarla con A-Frame.': 'Desktop preview is active. You can inspect and navigate the scene with A-Frame.',
        'No se pudo iniciar la sesión XR actual.': 'The current XR session could not start.',
        'Runtime XR activo.': 'XR runtime is active.',
        'Image target detectado. El portal quedó anclado a la imagen.': 'Image target detected. The portal is anchored to the marker.',
        'Se perdió el image target. Volvé a encuadrarlo para reanclar el portal.': 'Image target lost. Reframe the marker to anchor the portal again.',
        'Compatibilidad detectada: lista para AR o preview desktop.': 'Compatibility detected: ready for AR or desktop preview.',
        'Compatibilidad limitada: si no hay sesión AR, debería abrir el preview desktop.': 'Limited compatibility: desktop preview should still open when available.',
        'XR8 todavía no está disponible.': 'XR8 is not available yet.',
        'Runtime listo. Iniciando image tracking y preview desktop…': 'Runtime ready. Starting image tracking and desktop preview...'
      }

      function translate(text) {
        if (!text) return ''
        if (translations[text]) return translations[text]
        if (text.indexOf('Error XR: ') === 0) {
          return 'XR error: ' + text.slice('Error XR: '.length)
        }
        return text
      }

      function observeText(el) {
        if (!el) return
        var sync = function () {
          var next = translate(el.textContent.trim())
          if (next && el.textContent !== next) {
            el.textContent = next
          }
        }

        sync()
        new MutationObserver(sync).observe(el, {childList: true, characterData: true, subtree: true})
      }

      observeText(statusEl)
      observeText(compatibilityEl)
    })()
  </script>
</body>
</html>
